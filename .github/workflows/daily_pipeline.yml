name: Daily Spotify Monitor

on:
  schedule:
    # 每天 UTC 01:00 執行 (對應台灣時間 09:00)
    - cron: '0 1 * * *'
  workflow_dispatch:
    # 允許在 GitHub 網頁上手動按鈕觸發測試

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 Action 將產生出來的圖文報告 push 回到儲存庫

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 確保 checkout 時保留完整歷史紀錄，有助於後續 git push
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          # 安裝中文字體，讓懶人包圖片生成器能正確顯示中文
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk > /dev/null 2>&1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git for Auto-Deploy
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Run Spotify Monitor Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 執行 python main.py --run-now 讓它跑完一次就結束，由 GitHub 負責排程
          python main.py --run-now
